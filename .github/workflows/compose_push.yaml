name: docker compose build and push to docker hub

on:
  workflow_call:
    inputs:
      application-name:
        required: true
        type: string
      tag:
        required: false
        type: string
        default: ${{ github.event.pull_request.head.sha || github.sha }}
      push_to_docker_hub:
        required: false
        default: true
        type: boolean
    secrets:
      dockerhub_user:
        required: true
      dockerhub_pass:
        required: true

env:
  TAG: ${{ inputs.tag }}

jobs:
  compose_push:
    runs-on: selfhosted-github-runner

    steps:
    - name: Checkout
      uses: actions/checkout@v1

    - name: Log in to Docker Hub
      run: |
        docker login miceportal.nexus-registry-mice.boreus.de -u ${{ secrets.nexus_user }} -p ${{ secrets.nexus_pass }}
        sudo apt update
        sudo apt install libyaml-dev libgmp-dev -y
        mkdir -p ~/.docker/cli-plugins/
        curl -SL https://github.com/docker/compose/releases/download/v2.32.1/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
        chmod +x ~/.docker/cli-plugins/docker-compose

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1

    - name: Compose up
      uses: konvenit/workflowator/.github/actions/compose@MP-50534_Add_Action_Runner_Controller_helm_chart_values
      with:
        application-name: ${{ inputs.application-name }}

    - name: Push Docker image to Docker Hub
      if: ${{ inputs.push_to_docker_hub }}
      run: docker compose -f docker-compose.test.yml push ${{ inputs.application-name}}

    - name: Stop containers
      if: always()
      run: docker compose -f docker-compose.test.yml down
